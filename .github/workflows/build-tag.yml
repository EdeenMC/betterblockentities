# Used when a commit is tagged and pushed to the repository
# This makes use of caching for faster builds and uploads the resulting artifacts
name: build-tag

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: prod

    steps:
      - name: Extract current branch name
        shell: bash
        # bash pattern expansion to grab branch name without slashes
        run: ref="${GITHUB_REF#refs/heads/}" && echo "branch=${ref////-}" >> $GITHUB_OUTPUT
        id: ref
      - name: Checkout sources
        uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      - name: Execute Gradle build
        run: ./gradlew build -Pbuild.release=true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bbe-artifacts-${{ steps.ref.outputs.branch }}
          path: build/mod/*.jar

      - name: Publish Tag Release to EdeenMC Maven
        env:
          ORG_GRADLE_PROJECT_edeenMCMavenUsername: ${{ secrets.EDEENMC_MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_edeenMCMavenPassword: ${{ secrets.EDEENMC_MAVEN_PASSWORD }}
        if: ${{ env.ORG_GRADLE_PROJECT_edeenMCMavenUsername != '' && env.ORG_GRADLE_PROJECT_edeenMCMavenPassword != '' }}
        run: ./gradlew publishAllPublicationsToEdeenMCRepository -Pbuild.release=true